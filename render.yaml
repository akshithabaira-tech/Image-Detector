services:
  - type: web
    name: ai-image-detector
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.10
