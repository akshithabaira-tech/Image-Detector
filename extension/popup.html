<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image Detector</title>
  <style>
    :root {
      --primary: #7c6aff;
      --secondary: #32dc82;
      --bg: #0d0d12;
      --panel: rgba(26, 26, 38, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --text-muted: #7070a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      padding-bottom: 8px;
    }

    /* Glass Effect */
    .glass {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 10px;
    }

    .header {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(124, 106, 255, 0.1), transparent);
    }

    .logo {
      font-size: 24px;
      color: var(--primary);
      text-shadow: 0 0 12px rgba(124, 106, 255, 0.4);
    }

    .title-group h1 {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
      background: linear-gradient(to right, #fff, #bbb);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .section {
      padding: 12px 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Status Dot */
    .status-row { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #333;
    }
    .status-dot.online { background: var(--secondary); box-shadow: 0 0 8px var(--secondary); }
    .status-dot.offline { background: #ff4646; box-shadow: 0 0 8px #ff4646; }
    .status-dot.checking { background: #ffb432; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 11px; color: var(--text-muted); font-weight: 500; }

    /* History List */
    .history-list {
      margin-top: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--border);
    }

    .hist-thumb {
      width: 32px; height: 32px; border-radius: 4px;
      object-fit: cover; background: #222;
    }

    .hist-info { flex: 1; overflow: hidden; }
    .hist-pred { font-size: 11px; font-weight: 700; }
    .hist-pred.ai { color: #ff4646; }
    .hist-pred.real { color: var(--secondary); }
    .hist-conf { font-size: 10px; color: var(--text-muted); }

    .empty-state {
      padding: 20px; text-align: center; color: var(--text-muted); font-size: 11px;
    }

    /* Settings */
    .input-row { display: flex; gap: 8px; }
    input {
      flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; outline: none;
    }
    input:focus { border-color: var(--primary); }
    button {
      background: var(--primary); color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }

    .footer {
      margin-top: 10px; padding: 12px; text-align: center;
      font-size: 9px; color: #3a3a4a; letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="glass header">
    <div class="logo">⬡</div>
    <div class="title-group">
      <h1>AI IMAGE DETECTOR</h1>
      <div class="subtitle">VISION ARBITER v0.1.0</div>
    </div>
  </div>

  <div class="glass section">
    <div class="section-label">Server Connection</div>
    <div class="status-row">
      <div class="status-dot checking" id="statusDot"></div>
      <div class="status-text" id="statusText">Detecting health...</div>
    </div>
  </div>

  <div class="glass section">
    <div class="section-label">Analysis History</div>
    <div id="historyContainer" class="history-list">
      <!-- Generated by JS -->
      <div class="empty-state">No recent scans yet. Right-click an image to begin.</div>
    </div>
  </div>

  <div class="glass section">
    <div class="section-label">Endpoint Configuration</div>
    <div class="input-row">
      <input type="text" id="apiUrl" placeholder="http://localhost:8000" />
      <button id="saveBtn">SYNC</button>
    </div>
    <div id="savedMsg" style="color:var(--secondary); font-size:10px; margin-top:8px; display:none;">✓ Backend URL updated</div>
  </div>

  <div class="footer">
    ENSEMBLE ML · FFT ANALYSIS · WHATSAPP READY
  </div>

  <script src="popup.js"></script>
</body>
</html>
