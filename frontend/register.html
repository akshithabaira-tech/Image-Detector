<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Image Detector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .login-header {
            margin-bottom: 2.5rem;
        }
        .login-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }
        .status-msg {
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
        .error-msg { color: var(--danger-color); }
        .success-msg { color: var(--success-color); }
        
        .login-footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body class="login-page-body">
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🧠 AI Image Detector</h1>
        </div>
    </nav>

    <main class="container login-page">
        <div class="login-card glass-panel fade-in-up">
            <div class="login-header">
                <h2>New Specialist</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Register Forensic Credentials</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Specialist Identifier</label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. detective_smith" required>
                </div>
                <div class="form-group">
                    <label for="password">Create Security Protocol (Password)</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="registerBtn" class="glow-button">
                    <span class="btn-content">📡 REGISTER SYSTEM</span>
                </button>

                <div id="statusMsg" class="status-msg"></div>
            </form>

            <div class="login-footer">
                <p>Already registered? <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login Portal</a></p>
            </div>
        </div>
    </main>

    <script>
        const registerForm = document.getElementById('registerForm');
        const statusMsg = document.getElementById('statusMsg');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const registerBtn = document.getElementById('registerBtn');

            registerBtn.disabled = true;
            statusMsg.style.display = 'none';
            statusMsg.className = 'status-msg';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    statusMsg.textContent = '✅ Registration Successful! Redirecting...';
                    statusMsg.classList.add('success-msg');
                    statusMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    statusMsg.textContent = `⚠️ ${data.detail || 'Registration failed'}`;
                    statusMsg.classList.add('error-msg');
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                console.error('Registration error:', err);
                statusMsg.textContent = '⚠️ Connection to security server failed.';
                statusMsg.classList.add('error-msg');
                statusMsg.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
